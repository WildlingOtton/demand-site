services:
  db:
    image: postgres:16-alpine
    container_name: demand-site-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: demand_site
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
